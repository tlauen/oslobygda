name: Send nyhendebrev (Brevo)

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send uansett dato (test – sender også om det ikkje er 7 dagar før pøbb)"
        required: false
        default: false
        type: boolean
      bruk_test_lista:
        description: "Send til Brevo-lista «Test» (BREVO_TEST_LIST_ID), ikkje hovudlista «Nyhendebrev»"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "19 7 * * *" # UTC

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Oslo
      OSLOBYGDA_BASE_URL: https://oslobygda.no
      TRIGGER_UID_CONTAINS: pobb-
      DAYS_BEFORE_TRIGGER: "7"
      UPCOMING_LIMIT: "12"
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
      BREVO_TEST_LIST_ID: ${{ secrets.BREVO_TEST_LIST_ID }}
      BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
      BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
      BREVO_REPLY_TO: ${{ secrets.BREVO_REPLY_TO }}
      BREVO_BRUK_TEST_LISTE: ${{ github.event.inputs.bruk_test_lista == 'true' && '1' || '' }}
      OSLOBYGDA_FORCE_SEND: ${{ github.event.inputs.force_send == 'true' && '1' || '' }}
    steps:
      - uses: actions/checkout@v5
      - name: Send nyhendebrev via Brevo
        run: ruby skript/send_nyhendebrev_brevo.rb
