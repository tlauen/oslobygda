name: Send nyhendebrev (MailerLite)

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send uansett dato (test – sender også om det ikkje er 7 dagar før pøbb)"
        required: false
        default: false
        type: boolean
  schedule:
    # Køyr dagleg; scriptet avgjer om det er "rett dag" å sende.
    - cron: "17 7 * * *" # UTC

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Oslo
      OSLOBYGDA_BASE_URL: https://oslobygda.no
      TRIGGER_UID_CONTAINS: pobb-
      DAYS_BEFORE_TRIGGER: "7"
      UPCOMING_LIMIT: "12"

      MAILERLITE_API_TOKEN: ${{ secrets.MAILERLITE_API_TOKEN }}
      MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
      MAILERLITE_FROM_EMAIL: ${{ secrets.MAILERLITE_FROM_EMAIL }}
      MAILERLITE_FROM_NAME: ${{ secrets.MAILERLITE_FROM_NAME }}
      MAILERLITE_REPLY_TO: ${{ secrets.MAILERLITE_REPLY_TO }}
      OSLOBYGDA_FORCE_SEND: ${{ github.event.inputs.force_send == 'true' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Send nyhendebrev
        run: ruby scripts/send_nyhendebrev_mailerlite.rb
