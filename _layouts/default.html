<!doctype html>
<html lang="{{ site.lang | default: 'nn' }}" data-palette="pastell">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
  </title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,650&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
</head>
<body>
  <a class="skip" href="#innhald">Hopp til innhald</a>

<header class="site-header">
  <div class="wrap header-inner">
    {% include nav.html %}

   <!-- <button class="theme-toggle" type="button" id="themeToggle" aria-label="Byt tema">
      🌓
    </button>-->
  </div>
</header>

  <main id="innhald" class="site-main">
    <div class="wrap prose">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      {% include footer.html %}
    </div>
  </footer>
  
  <script>
(function(){
  const root = document.documentElement;
  const key = "oslobygda-theme";
  const btn = document.getElementById("themeToggle");
  if(!btn) return;

  // init
  const saved = localStorage.getItem(key);
  if(saved === "light" || saved === "dark") root.dataset.theme = saved;

  btn.addEventListener("click", () => {
    const cur = root.dataset.theme;
    const next = (cur === "dark") ? "light" : "dark";
    root.dataset.theme = next;
    localStorage.setItem(key, next);
  });
})();
</script>
</body>
</html>
