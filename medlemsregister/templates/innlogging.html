<!DOCTYPE html>
<html lang="nn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bygdelista – Medlemsregisteret for Oslobygda kulturlag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,650&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ prefix_url('static', filename='style.css') }}" />
</head>
<body class="innlogging-kropp">
  <main class="innlogging-boks">
    <h1>Bygdelista – Medlemsregisteret for Oslobygda kulturlag</h1>
    <p class="ingress">Logg inn for å opne lista.</p>
    {% if error %}
    <p class="feil">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ prefix_url('login') }}">
      <label for="password">Passord</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">Logg inn</button>
    </form>
  </main>
</body>
</html>
