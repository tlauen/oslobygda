<!DOCTYPE html>
<html lang="nn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bli medlem – Bygdelista, Oslobygda kulturlag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,650&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ prefix_url('static', filename='style.css') }}" />
</head>
<body>
  <div class="omslag">
    <header class="header">
      <h1>Bli medlem</h1>
      <a href="{{ prefix_url('login') }}">Logg inn (styret)</a>
    </header>

    <p class="ingress">Fyll ut skjemaet for å melde deg inn som medlem i Oslobygda kulturlag. Du blir lagt inn i Bygdelista og kan få nyhendebrev frå oss.</p>

    <div id="melding" class="melding" role="alert" style="display: none;"></div>

    <form id="innmelding-skjema" class="innmelding-skjema">
      <div class="felt">
        <label for="fornamn">Fornamn *</label>
        <input type="text" id="fornamn" required />
      </div>
      <div class="felt">
        <label for="mellomnamn">Mellomnamn</label>
        <input type="text" id="mellomnamn" />
      </div>
      <div class="felt">
        <label for="etternamn">Etternamn *</label>
        <input type="text" id="etternamn" required />
      </div>
      <div class="felt">
        <label for="email">Epost *</label>
        <input type="email" id="email" required />
      </div>
      <div class="felt">
        <label for="phone">Telefon</label>
        <input type="tel" id="phone" />
      </div>
      <div class="felt">
        <label for="adresse">Adresse</label>
        <input type="text" id="adresse" />
      </div>
      <div class="felt">
        <label for="postnummer">Postnummer</label>
        <input type="text" id="postnummer" inputmode="numeric" maxlength="4" />
      </div>
      <div class="felt">
        <label for="poststad">Poststad</label>
        <input type="text" id="poststad" />
      </div>
      <div class="felt">
        <label for="birth_date">Fødselsdato</label>
        <input type="date" id="birth_date" />
      </div>
      <div class="felt">
        <label for="membership_type">Medlemstype</label>
        <select id="membership_type">
          <option value="vanleg">Kul (5 kr)</option>
          <option value="kul">Superkul (meir enn 5 kr)</option>
        </select>
      </div>
      <div class="felt felt-sjekk">
        <label class="sjekk-wrap">
          <input type="checkbox" id="consent" required />
          <span>Eg godtar at Oslobygda kulturlag lagrar og brukar mine opplysningar til medlemskap og nyhendebrev. Opplysningane vert ikkje delt med andre. Eg kan når som helst be om innsyn eller sletting.</span>
        </label>
      </div>
      <div class="knappar">
        <button type="submit" class="btn" id="btn-send">Meld meg inn</button>
      </div>
    </form>
  </div>

  <script>
    const API = "{{ url_prefix }}";
    const skjema = document.getElementById("innmelding-skjema");
    const meldingEl = document.getElementById("melding");
    const btnSend = document.getElementById("btn-send");

    function visMelding(tekst, type) {
      meldingEl.textContent = tekst;
      meldingEl.style.display = "block";
      meldingEl.className = "melding " + (type === "feil" ? "melding-feil" : type === "advarsel" ? "melding-advarsel" : "melding-ok");
    }

    skjema.addEventListener("submit", async (e) => {
      e.preventDefault();
      meldingEl.style.display = "none";
      btnSend.disabled = true;
      btnSend.textContent = "Sender …";

      const body = {
        fornamn: document.getElementById("fornamn").value.trim(),
        mellomnamn: document.getElementById("mellomnamn").value.trim(),
        etternamn: document.getElementById("etternamn").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        adresse: document.getElementById("adresse").value.trim(),
        postnummer: document.getElementById("postnummer").value.trim(),
        poststad: document.getElementById("poststad").value.trim(),
        birth_date: document.getElementById("birth_date").value.trim() || "",
        membership_type: document.getElementById("membership_type").value,
        consent: document.getElementById("consent").checked
      };

      try {
        const r = await fetch(API + "/api/innmelding", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const data = await r.json().catch(() => ({}));

        if (!r.ok) {
          visMelding(data.error || "Noko gjekk galt. Prøv igjen.", "feil");
          btnSend.disabled = false;
          btnSend.textContent = "Meld meg inn";
          return;
        }

        visMelding(data.message + (data.warning ? " " + data.warning : ""), data.warning ? "advarsel" : "ok");
        skjema.reset();
        btnSend.textContent = "Meld meg inn";
        btnSend.disabled = false;
      } catch (err) {
        visMelding("Kunne ikkje sende: " + err.message, "feil");
        btnSend.disabled = false;
        btnSend.textContent = "Meld meg inn";
      }
    });
  </script>
</body>
</html>
